server:
  port: 8082

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/student_system?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

jwt:
  secret: StudentSystemSecretKeyForJWT2026VeryLongSecretKey!!
  expiration: 7200000

logging:
  level:
    com.student: debug
